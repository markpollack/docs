<?xml version="1.0" encoding="UTF-8"?>
<svg width="160" height="200" viewBox="0 0 160 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- FIX 2: single filter on group -->
            <filter id="hw-shadow" x="-28%" y="-18%" width="156%" height="150%">
              <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.48"/>
            </filter>
          </defs>

          <ellipse cx="80" cy="197" rx="44" ry="5" fill="#000" opacity="0.18"/>

          <!-- FIX 2: single grouped shadow -->
          <g filter="url(#hw-shadow)">
            <rect x="26" y="76" width="108" height="108" rx="32"
                  fill="#e8a820"
                  stroke="#a06800" stroke-width="1.5"/>
            <ellipse cx="80" cy="65" rx="48" ry="52"
                     fill="#e8a820"
                     stroke="#a06800" stroke-width="1.5"/>
          </g>

          <!-- chest screen — brand / agento.works -->
          <rect x="42" y="98" width="76" height="54" rx="9" fill="#071510" stroke="#1e3a22" stroke-width="1.5"/>
          <rect x="50" y="106" width="38" height="3" rx="1.5" fill="#3fb950" opacity="0.9"/>
          <rect x="50" y="113" width="54" height="3" rx="1.5" fill="#3fb950" opacity="0.6"/>
          <rect x="50" y="120" width="30" height="3" rx="1.5" fill="#f0b429" opacity="0.8"/>
          <text x="80" y="138" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#f0b429">agento.works</text>
          <rect x="50" y="143" width="7"  height="3" rx="1" fill="#3fb950">
            <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
          </rect>

          <!-- spring leaf badge -->
          <circle cx="106" cy="102" r="9" fill="#071a0d" stroke="#1e4a25" stroke-width="1.5"/>
          <path d="M 101 106 Q 106 97 111 106 Q 106 111 101 106 Z" fill="#6db33f"/>

          <!-- goggle band -->
          <rect x="28" y="51" width="104" height="26" rx="13" fill="#12121e" opacity="0.9"/>

          <!-- left goggle — bright happy eyes -->
          <circle cx="57"  cy="64" r="17" fill="#080e18" stroke="#2a3545" stroke-width="2"/>
          <circle cx="57"  cy="64" r="12" fill="#121e30"/>
          <circle cx="57"  cy="64" r="7"  fill="#0c1520"/>
          <circle cx="53"  cy="60" r="3.5" fill="white" opacity="0.7"/>
          <circle cx="57"  cy="65" r="4"   fill="#060d18"/>
          <circle cx="55"  cy="63" r="1.4" fill="white" opacity="0.95"/>

          <!-- right goggle -->
          <circle cx="103" cy="64" r="17" fill="#080e18" stroke="#2a3545" stroke-width="2"/>
          <circle cx="103" cy="64" r="12" fill="#121e30"/>
          <circle cx="103" cy="64" r="7"  fill="#0c1520"/>
          <circle cx="99"  cy="60" r="3.5" fill="white" opacity="0.7"/>
          <circle cx="103" cy="65" r="4"   fill="#060d18"/>
          <circle cx="101" cy="63" r="1.4" fill="white" opacity="0.95"/>

          <!-- bridge -->
          <rect x="68" y="61" width="24" height="6" rx="3" fill="#12121e"/>

          <!-- big friendly smile -->
          <path d="M 62 84 Q 80 98 98 84" stroke="#7a5000" stroke-width="2.5" fill="none" stroke-linecap="round"/>

          <!-- antenna -->
          <line x1="80" y1="13" x2="80" y2="33" stroke="#b07208" stroke-width="3.5" stroke-linecap="round"/>
          <circle cx="80" cy="9" r="7" fill="#3fb950">
            <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
          </circle>
          <circle cx="80" cy="9" r="3.5" fill="#a0ffa0"/>

          <!-- LEFT arm — waving up high. FIX 1: single clean path -->
          <path d="M 26 108 Q 2 88 8 62" stroke="#c07d0a" stroke-width="13" fill="none" stroke-linecap="round"/>
          <circle cx="8" cy="59" r="9" fill="#a86800" stroke="#7a5000" stroke-width="1">
            <!-- gentle sway on the waving hand -->
            <animateTransform attributeName="transform" type="translate" values="0,0; 3,-4; 0,0; -3,-4; 0,0" dur="1.2s" repeatCount="indefinite"/>
          </circle>

          <!-- right arm — relaxed at side. FIX 1: single clean path -->
          <path d="M 134 112 Q 154 126 150 148" stroke="#c07d0a" stroke-width="13" fill="none" stroke-linecap="round"/>
          <circle cx="150" cy="151" r="9" fill="#a86800" stroke="#7a5000" stroke-width="1"/>

          <!-- legs -->
          <rect x="50" y="175" width="24" height="22" rx="9" fill="#b07208" stroke="#7a5000" stroke-width="1"/>
          <rect x="86" y="175" width="24" height="22" rx="9" fill="#b07208" stroke="#7a5000" stroke-width="1"/>
          <rect x="46" y="188" width="30" height="11" rx="5.5" fill="#12121e"/>
          <rect x="84" y="188" width="30" height="11" rx="5.5" fill="#12121e"/>
        </svg>
