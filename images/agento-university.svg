<?xml version="1.0" encoding="UTF-8"?>
<svg width="160" height="200" viewBox="0 0 160 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- FIX 2: single filter on group -->
            <filter id="pr-shadow" x="-28%" y="-18%" width="156%" height="150%">
              <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#5a3ab5" flood-opacity="0.22"/>
            </filter>
          </defs>

          <ellipse cx="80" cy="197" rx="44" ry="5" fill="#000" opacity="0.18"/>

          <!-- FIX 2: single grouped shadow -->
          <g filter="url(#pr-shadow)">
            <rect x="26" y="76" width="108" height="108" rx="32"
                  fill="#7a5ad8"
                  stroke="#3a1a8a" stroke-width="1.5"/>
            <ellipse cx="80" cy="65" rx="48" ry="52"
                     fill="#7a5ad8"
                     stroke="#3a1a8a" stroke-width="1.5"/>
          </g>

          <!-- mortar board — sits above shadow group so renders on top -->
          <polygon points="80,4 36,22 124,22" fill="#0d0820"/>
          <rect x="36" y="20" width="88" height="11" rx="2" fill="#08050f"/>
          <!-- tassel -->
          <line x1="120" y1="22" x2="130" y2="38" stroke="#f0b429" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="130" cy="41" r="5" fill="#f0b429"/>

          <!-- chest terminal — research purple -->
          <rect x="42" y="98" width="76" height="54" rx="9" fill="#0a0520" stroke="#2a1050" stroke-width="1.5"/>
          <rect x="50" y="106" width="40" height="3" rx="1.5" fill="#bc8cff" opacity="0.9"/>
          <rect x="50" y="113" width="56" height="3" rx="1.5" fill="#bc8cff" opacity="0.6"/>
          <rect x="50" y="120" width="32" height="3" rx="1.5" fill="#f0b429" opacity="0.8"/>
          <rect x="50" y="127" width="48" height="3" rx="1.5" fill="#bc8cff" opacity="0.45"/>
          <text x="80" y="144" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#bc8cff" opacity="0.9">RESEARCH LAB</text>

          <!-- U badge -->
          <circle cx="106" cy="102" r="9" fill="#0a0520" stroke="#5a3ab5" stroke-width="1.5"/>
          <text x="106" y="107" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="bold" fill="#bc8cff">U</text>

          <!-- goggle band -->
          <rect x="28" y="51" width="104" height="26" rx="13" fill="#0d0820" opacity="0.92"/>

          <!-- left goggle — wise half-lid -->
          <circle cx="57"  cy="64" r="17" fill="#0a0520" stroke="#2a1050" stroke-width="2"/>
          <circle cx="57"  cy="64" r="12" fill="#100a20"/>
          <circle cx="57"  cy="65" r="5"  fill="#050210"/>
          <!-- heavy lid -->
          <path d="M 42 60 Q 57 55 72 60" stroke="#0d0820" stroke-width="5" fill="none"/>
          <circle cx="55"  cy="63" r="1.3" fill="white" opacity="0.8"/>

          <!-- right goggle — same half-lid -->
          <circle cx="103" cy="64" r="17" fill="#0a0520" stroke="#2a1050" stroke-width="2"/>
          <circle cx="103" cy="64" r="12" fill="#100a20"/>
          <circle cx="103" cy="65" r="5"  fill="#050210"/>
          <path d="M 88 60 Q 103 55 118 60" stroke="#0d0820" stroke-width="5" fill="none"/>
          <circle cx="101" cy="63" r="1.3" fill="white" opacity="0.8"/>

          <!-- bridge -->
          <rect x="68" y="61" width="24" height="6" rx="3" fill="#0d0820"/>

          <!-- knowing slight smile -->
          <path d="M 66 85 Q 80 91 94 85" stroke="#3a1a7a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

          <!-- antenna — off, scholar doesn't need it -->
          <line x1="80" y1="4" x2="80" y2="22" stroke="#3a1a7a" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

          <!-- left arm holding book — FIX 1: single clean path -->
          <path d="M 26 112 Q 6 128 12 152" stroke="#5a3ab5" stroke-width="13" fill="none" stroke-linecap="round"/>
          <rect x="0"  y="146" width="18" height="24" rx="2.5" fill="#0d0820" stroke="#2a1050" stroke-width="1.5"/>
          <rect x="2"  y="148" width="14" height="20" rx="1.5" fill="#080515"/>
          <line x1="9"  y1="148" x2="9"  y2="168" stroke="#3a1a7a" stroke-width="0.8"/>

          <!-- right arm holding book — FIX 1: single clean path -->
          <path d="M 134 112 Q 154 128 148 152" stroke="#5a3ab5" stroke-width="13" fill="none" stroke-linecap="round"/>
          <rect x="142" y="146" width="18" height="24" rx="2.5" fill="#0d0820" stroke="#2a1050" stroke-width="1.5"/>
          <rect x="144" y="148" width="14" height="20" rx="1.5" fill="#080515"/>
          <line x1="151" y1="148" x2="151" y2="168" stroke="#3a1a7a" stroke-width="0.8"/>

          <!-- legs -->
          <rect x="50" y="175" width="24" height="22" rx="9" fill="#5a3ab5" stroke="#3a1a8a" stroke-width="1"/>
          <rect x="86" y="175" width="24" height="22" rx="9" fill="#5a3ab5" stroke="#3a1a8a" stroke-width="1"/>
          <rect x="46" y="188" width="30" height="11" rx="5.5" fill="#0d0820"/>
          <rect x="84" y="188" width="30" height="11" rx="5.5" fill="#0d0820"/>
        </svg>
